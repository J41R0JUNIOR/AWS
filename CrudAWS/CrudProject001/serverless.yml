org: j41r0
service: CrudProject001

provider:
  name: aws
  runtime: nodejs20.x
  iam: 
    role:
      statements:
        - Effect: "Allow"
          Action:
            - dynamodb:*
          Resource: "*"

functions:
  patientsCreate:
    handler: src/patients/functions/createPatient.handler
    events:
      - http:
          method: POST
          path: patients

  patientsRead:
    handler: src/patients/functions/readPatient.handler
    events:
      - http:
          method: GET
          path: patients/allPatients
        
  patientReadById:
    handler: src/patients/functions/readPatientById.handler
    events:
      - http:
          method: GET
          path: patients/{id}

  patientsPatch:
    handler: src/patients/functions/patchPatient.handler
    events:
      - http:
          method: PATCH
          path: patients/{id}

  patientsDelete:
    handler: src/patients/functions/deletePatient.handler
    events:
      - http:
          method: DELETE
          path: patients/{id}

resources:
  Resources:
    patientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Patients 
        AttributeDefinitions:
          - AttributeName: PK #taxId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
